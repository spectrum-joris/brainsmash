<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quizzes - Leerkracht</title>
    <link rel="icon" type="image/png" href="../favicon../favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../favicon../favicon.svg" />
    <link rel="shortcut icon" href="../favicon../favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../favicon/site.webmanifest" />
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <!-- Header voor leerkrachten -->
    <div id="header"></div>

    <!-- Statistieken -->
    <section id="stats">
        <h2>Quiz Statistieken</h2>
        <p>Hoogste score: <span id="highest-score">Laden...</span></p>
        <p>Aantal keren voltooid: <span id="total-attempts">Laden...</span></p>
    </section>

    <!-- Zoekveld -->
    <section id="search">
        <input type="text" id="search-input" placeholder="Zoek quizzen...">
        <button id="search-button">Zoeken</button>
    </section>

    <!-- Lijst met quizzen -->
    <main>
        <h1>Mijn Quizzen</h1>
        <div id="quiz-list">
            <p>Quizzen laden...</p>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../scripts/layout.js"></script>
    <script src="../scripts/dashboard_teacher.js"></script>
</body>
</html>
