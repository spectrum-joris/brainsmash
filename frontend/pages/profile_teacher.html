<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Profiel</title>
    <link rel="icon" type="image/png" href="../favicon../favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../favicon../favicon.svg" />
    <link rel="shortcut icon" href="../favicon../favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../favicon/site.webmanifest" />
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <main>
        <h1>Mijn Profiel</h1>
        <img id="avatar" src="../public/default-avatar.png" alt="Avatar">
        <input type="file" id="avatarUpload">
        <button id="uploadBtn">Profielfoto wijzigen</button>
        <h2 id="nickname">Leerkracht</h2>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>School:</strong> <span id="school"></span></p>
        <p><strong>Richting:</strong> <span id="richting"></span></p>

        <h2>Quiz Statistieken</h2>
        <p><strong>Aantal aangemaakte quizzen:</strong> <span id="totalQuizzes"></span></p>
        <p><strong>Aantal attempts:</strong> <span id="totalAttempts"></span></p>
        <p><strong>Gemiddelde score:</strong> <span id="avgScore"></span></p>
        <p><strong>Best presterende quiz:</strong> <span id="bestQuiz"></span></p>
    </main>
    <script src="../scripts/teacher_profile.js"></script>
</body>
</html>
