<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreren</title>
    <link rel="icon" type="image/png" href="../favicon../favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../favicon../favicon.svg" />
    <link rel="shortcut icon" href="../favicon../favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../favicon/site.webmanifest" />
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <main>
        <h1>Registreren</h1>
        <form id="registerForm">
            <input type="text" id="full_name" placeholder="Volledige naam" required>
            <input type="text" id="nickname" placeholder="Gebruikersnaam" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Wachtwoord" required>

            <select id="role">
                <option value="leerling">Leerling</option>
                <option value="leerkracht">Leerkracht</option>
            </select>

            <select id="school" required>
                <option value="">Selecteer een school</option>
            </select>

            <select id="program" required>
                <option value="">Selecteer een richting</option>
            </select>

            <select id="grade" required>
                <option value="">Selecteer een graad</option>
            </select>

            <button type="submit">Registreren</button>
        </form>
        <p id="error-message" style="color: red;"></p>
        <p>Heb je al een account? <a href="/pages/login.html">Log in</a></p>
    </main>
    <script src="../scripts/register.js"></script>
</body>
</html>
